<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📏</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Unit Converter | ToolkitPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-body: #f1f5f9; --bg-surface: #ffffff; --text-primary: #0f172a; --text-secondary: #334155; --border-light: #e2e8f0; --primary: #2563eb; --accent: #f59e0b; }
        body.dark { --bg-body: #0a0f1c; --bg-surface: #111827; --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --border-light: #1e293b; --primary: #3b82f6; --accent: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-primary); transition: 0.2s; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 28px; }
        .navbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid var(--border-light); background: var(--bg-surface); }
        .logo h1 { font-size: 1.85rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #4f46e5); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { text-decoration: none; font-weight: 600; color: #1e293b; color: var(--text-primary); }
        .contact-email { background: var(--primary-soft); padding: 5px 14px; border-radius: 40px; font-size: 0.75rem; color: var(--primary); background: #eff6ff; }
        .dark-toggle { background: #eff6ff; border: none; border-radius: 40px; padding: 6px 16px; cursor: pointer; }
        .hamburger { display: none; font-size: 1.8rem; cursor: pointer; }
        .mobile-menu { display: none; flex-direction: column; background: var(--bg-surface); padding: 20px; border-radius: 24px; margin: 10px 0; gap: 14px; }
        .mobile-menu.show { display: flex; }
        .tool-card { background: var(--bg-surface); border-radius: 32px; padding: 2rem; max-width: 800px; margin: 40px auto; text-align: center; }
        .unit-select { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        select, input { padding: 12px 20px; border-radius: 60px; border: 1.5px solid var(--border-light); background: var(--bg-body); font-size: 1rem; }
        .result { font-size: 1.8rem; font-weight: 700; color: var(--accent); margin: 20px 0; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 32px; border-radius: 60px; cursor: pointer; }
        footer { background: var(--bg-surface); border-top: 1px solid var(--border-light); padding: 35px 0; margin-top: 40px; text-align: center; }
        @media (max-width: 768px) { .nav-links { display: none; } .hamburger { display: block; } .container { padding: 0 18px; } }
    </style>
</head>
<body>
<div class="site-header"><div class="container"><div class="navbar"><div class="logo"><h1>ToolkitPro</h1></div><div class="nav-links"><a href="/">Home</a><a href="/tools/all">Tools</a><a href="#">Categories</a><span class="contact-email"><i class="far fa-envelope"></i> supporttoolkitpro@gmail.com</span><button id="darkToggle" class="dark-toggle"><i class="fas fa-moon"></i> Dark</button></div><div class="hamburger" id="hamburgerBtn">☰</div></div><div class="mobile-menu" id="mobileMenu"><a href="/">Home</a><a href="/tools/all">Tools</a><a href="#">Categories</a><div class="contact-email">supporttoolkitpro@gmail.com</div></div></div></div>
<div class="container"><div class="tool-card"><h1><i class="fas fa-ruler-combined"></i> Unit Converter</h1><p>Convert Length, Mass, Volume, Temperature</p>
<div style="display: flex; gap: 10px; justify-content: center; margin: 20px;"><button class="btn-primary" onclick="setType('length')">Length</button><button class="btn-primary" onclick="setType('mass')">Mass</button><button class="btn-primary" onclick="setType('volume')">Volume</button><button class="btn-primary" onclick="setType('temp')">Temperature</button></div>
<div class="unit-select"><input type="number" id="value" value="1" step="any"><select id="fromUnit"></select><span>→</span><select id="toUnit"></select></div>
<button class="btn-primary" onclick="convert()">Convert</button><div class="result" id="result">—</div></div></div>
<footer><div class="container"><p>© 2025 ToolkitPro — Free online tools | <a href="mailto:supporttoolkitpro@gmail.com">supporttoolkitpro@gmail.com</a></p></div></footer>
<script>
const units = { length: { meter:1, kilometer:0.001, mile:0.000621371, foot:3.28084, inch:39.3701 }, mass: { gram:1, kilogram:0.001, pound:0.00220462, ounce:0.035274 }, volume: { liter:1, milliliter:1000, gallon:0.264172, quart:1.05669 }, temp: { celsius:1, fahrenheit:1, kelvin:1 } };
let currentType = 'length';
function setType(t) { currentType = t; updateUnits(); convert(); }
function updateUnits() { const from = document.getElementById('fromUnit'); const to = document.getElementById('toUnit'); const keys = Object.keys(units[currentType]); from.innerHTML = ''; to.innerHTML = ''; keys.forEach(k => { from.innerHTML += `<option value="${k}">${k}</option>`; to.innerHTML += `<option value="${k}">${k}</option>`; }); from.value = keys[0]; to.value = keys[1]; }
function convert() { let val = parseFloat(document.getElementById('value').value); let from = document.getElementById('fromUnit').value; let to = document.getElementById('toUnit').value; if(currentType === 'temp') { let c; if(from === 'celsius') c = val; else if(from === 'fahrenheit') c = (val-32)*5/9; else c = val-273.15; let result; if(to === 'celsius') result = c; else if(to === 'fahrenheit') result = c*9/5+32; else result = c+273.15; document.getElementById('result').innerHTML = `${val} ${from} = ${result.toFixed(2)} ${to}`; } else { let result = val * (units[currentType][to] / units[currentType][from]); document.getElementById('result').innerHTML = `${val} ${from} = ${result.toFixed(4)} ${to}`; } }
document.getElementById('darkToggle').onclick = () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); };
if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
updateUnits(); convert();
document.querySelectorAll('#value, #fromUnit, #toUnit').forEach(el => el.addEventListener('change', convert));
document.getElementById('hamburgerBtn').onclick = () => document.getElementById('mobileMenu').classList.toggle('show');
</script>
</body>
</html>
