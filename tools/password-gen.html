<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - ToolKit Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #f8fafc; --bg-surface: #ffffff; --text-primary: #0f172a; --border-light: #e2e8f0; --primary: #0f3b5f; --accent: #ff8c42; }
        body.dark { --bg-primary: #0a0c10; --bg-surface: #111418; --text-primary: #edf2f7; --border-light: #1e293b; }
        body { background: var(--bg-primary); font-family: system-ui; transition: 0.2s; }
        .container { max-width: 700px; margin: 0 auto; padding: 2rem; }
        .card { background: var(--bg-surface); border-radius: 1.5rem; padding: 2rem; border: 1px solid var(--border-light); }
        .password-display { font-size: 1.8rem; font-family: monospace; background: var(--bg-primary); padding: 1rem; border-radius: 1rem; text-align: center; letter-spacing: 2px; margin: 1rem 0; }
        input, button { padding: 0.75rem; margin: 0.5rem 0; border-radius: 0.75rem; border: 1px solid var(--border-light); }
        .btn-primary { background: var(--primary); color: white; border: none; cursor: pointer; width: 100%; }
        .theme-toggle { position: fixed; top: 1rem; right: 1rem; background: var(--bg-surface); border: 1px solid var(--border-light); padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; }
        @media (max-width: 768px) { .container { padding: 1rem; } }
    </style>
</head>
<body>
<button class="theme-toggle" id="darkToggle"><i class="fas fa-moon"></i> Dark</button>
<div class="container">
    <div class="card">
        <h1><i class="fas fa-random"></i> Secure Password Generator</h1>
        <div class="password-display" id="password">Click Generate</div>
        <label>Length: <span id="lenVal">12</span></label>
        <input type="range" id="length" min="6" max="32" value="12">
        <div><label><input type="checkbox" id="uppercase" checked> Uppercase</label></div>
        <div><label><input type="checkbox" id="lowercase" checked> Lowercase</label></div>
        <div><label><input type="checkbox" id="numbers" checked> Numbers</label></div>
        <div><label><input type="checkbox" id="symbols" checked> Symbols</label></div>
        <button class="btn-primary" id="generateBtn">Generate Password</button>
        <button class="btn-primary" id="copyBtn" style="background: var(--accent);">Copy to Clipboard</button>
    </div>
</div>
<script>
    const darkToggle = document.getElementById('darkToggle');
    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    darkToggle.onclick = () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); };
    const lengthSlider = document.getElementById('length');
    const lenVal = document.getElementById('lenVal');
    lengthSlider.oninput = () => lenVal.innerText = lengthSlider.value;
    function generate() { let chars = ''; if(document.getElementById('uppercase').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; if(document.getElementById('lowercase').checked) chars += 'abcdefghijklmnopqrstuvwxyz'; if(document.getElementById('numbers').checked) chars += '0123456789'; if(document.getElementById('symbols').checked) chars += '!@#$%^&*()_+'; if(!chars) return alert('Select at least one'); let pass = ''; for(let i=0; i<parseInt(lengthSlider.value); i++) pass += chars[Math.floor(Math.random() * chars.length)]; document.getElementById('password').innerText = pass; }
    document.getElementById('generateBtn').onclick = generate;
    document.getElementById('copyBtn').onclick = () => { const p = document.getElementById('password').innerText; navigator.clipboard.writeText(p); alert('Copied!'); };
    generate();
</script>
</body>
</html>
