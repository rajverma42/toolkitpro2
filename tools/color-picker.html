<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Color Picker | ToolkitPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-body: #f1f5f9; --bg-surface: #ffffff; --text-primary: #0f172a; --border-light: #e2e8f0; --primary: #2563eb; --accent: #f59e0b; }
        body.dark { --bg-body: #0a0f1c; --bg-surface: #111827; --text-primary: #f1f5f9; --border-light: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-primary); transition: 0.2s; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 28px; }
        .navbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid var(--border-light); background: var(--bg-surface); }
        .logo h1 { font-size: 1.85rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #4f46e5); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .contact-email { background: #eff6ff; padding: 5px 14px; border-radius: 40px; font-size: 0.75rem; color: var(--primary); }
        .dark-toggle { background: #eff6ff; border: none; border-radius: 40px; padding: 6px 16px; cursor: pointer; }
        .hamburger { display: none; font-size: 1.8rem; cursor: pointer; }
        .mobile-menu { display: none; flex-direction: column; background: var(--bg-surface); padding: 20px; border-radius: 24px; margin: 10px 0; gap: 14px; }
        .mobile-menu.show { display: flex; }
        .tool-card { background: var(--bg-surface); border-radius: 32px; padding: 2rem; max-width: 550px; margin: 40px auto; text-align: center; }
        .color-preview { width: 200px; height: 200px; border-radius: 24px; margin: 20px auto; border: 3px solid var(--border-light); }
        input[type="color"] { width: 80px; height: 80px; border: none; border-radius: 16px; cursor: pointer; margin: 10px; }
        .color-values { background: var(--bg-body); border-radius: 20px; padding: 20px; margin-top: 20px; }
        .value-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-light); }
        .copy-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; }
        footer { background: var(--bg-surface); border-top: 1px solid var(--border-light); padding: 35px 0; margin-top: 40px; text-align: center; }
        @media (max-width: 768px) { .nav-links { display: none; } .hamburger { display: block; } }
    </style>
</head>
<body>
<div class="site-header"><div class="container"><div class="navbar"><div class="logo"><h1>ToolkitPro</h1></div><div class="nav-links"><a href="/">Home</a><a href="/tools/all">Tools</a><span class="contact-email"><i class="far fa-envelope"></i> supporttoolkitpro@gmail.com</span><button id="darkToggle" class="dark-toggle"><i class="fas fa-moon"></i> Dark</button></div><div class="hamburger" id="hamburgerBtn">☰</div></div><div class="mobile-menu" id="mobileMenu"><a href="/">Home</a><a href="/tools/all">Tools</a><div class="contact-email">supporttoolkitpro@gmail.com</div></div></div></div>
<div class="container"><div class="tool-card"><h1><i class="fas fa-eye-dropper"></i> Color Picker</h1>
<input type="color" id="colorPicker" value="#2563eb">
<div class="color-preview" id="colorPreview" style="background-color: #2563eb;"></div>
<div class="color-values"><div class="value-row"><span>HEX:</span><span id="hexValue">#2563eb</span><button class="copy-btn" onclick="copyText('hex')">Copy</button></div>
<div class="value-row"><span>RGB:</span><span id="rgbValue">rgb(37, 99, 235)</span><button class="copy-btn" onclick="copyText('rgb')">Copy</button></div>
<div class="value-row"><span>HSL:</span><span id="hslValue">hsl(221, 83%, 53%)</span><button class="copy-btn" onclick="copyText('hsl')">Copy</button></div></div></div></div>
<footer><div class="container"><p>© 2025 ToolkitPro — Free online tools | <a href="mailto:supporttoolkitpro@gmail.com">supporttoolkitpro@gmail.com</a></p></div></footer>
<script>
const picker = document.getElementById('colorPicker'); const preview = document.getElementById('colorPreview'); const hexSpan = document.getElementById('hexValue'); const rgbSpan = document.getElementById('rgbValue'); const hslSpan = document.getElementById('hslValue');
function hexToRgb(hex) { let r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16); return {r,g,b}; }
function rgbToHsl(r,g,b) { r/=255; g/=255; b/=255; let max=Math.max(r,g,b), min=Math.min(r,g,b), h,s,l=(max+min)/2; if(max===min) h=s=0; else { let d=max-min; s=l>0.5?d/(2-max-min):d/(max+min); if(max===r) h=(g-b)/d+(g<b?6:0); else if(max===g) h=(b-r)/d+2; else h=(r-g)/d+4; h/=6; } return {h:Math.round(h*360), s:Math.round(s*100), l:Math.round(l*100)}; }
function updateColor() { let hex = picker.value; preview.style.backgroundColor = hex; hexSpan.innerText = hex; let rgb = hexToRgb(hex); rgbSpan.innerText = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`; let hsl = rgbToHsl(rgb.r, rgb.g, rgb.b); hslSpan.innerText = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`; }
picker.addEventListener('input', updateColor);
function copyText(type) { let text = type === 'hex' ? hexSpan.innerText : type === 'rgb' ? rgbSpan.innerText : hslSpan.innerText; navigator.clipboard.writeText(text); alert(`Copied: ${text}`); }
document.getElementById('darkToggle').onclick = () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); };
if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
document.getElementById('hamburgerBtn').onclick = () => document.getElementById('mobileMenu').classList.toggle('show');
updateColor();
</script>
</body>
</html>
