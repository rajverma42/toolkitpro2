<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PDF to Word Converter - ToolKit Pro</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg-primary:#f8fafc;--bg-surface:#fff;--text-primary:#0f172a;--border-light:#e2e8f0;--primary:#0f3b5f;--accent:#ff8c42}body.dark{--bg-primary:#0a0c10;--bg-surface:#111418;--text-primary:#edf2f7;--border-light:#1e293b}body{background:var(--bg-primary);color:var(--text-primary);font-family:system-ui}.container{max-width:900px;margin:0 auto;padding:2rem}.tool-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}.logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}.theme-toggle{background:var(--bg-surface);border:1px solid var(--border-light);padding:0.5rem 1rem;border-radius:2rem;cursor:pointer}.card{background:var(--bg-surface);border-radius:1.5rem;padding:2rem;border:1px solid var(--border-light);text-align:center}input,button{padding:0.75rem;margin:1rem 0;border-radius:0.75rem}.btn-primary{background:var(--primary);color:white;border:none;cursor:pointer;padding:0.75rem 2rem}</style></head>
<body><div class="container"><div class="tool-header"><a href="index.html" class="logo">ToolKit<span style="color:var(--accent);">Pro</span></a><button class="theme-toggle" id="darkToggle"><i class="fas fa-moon"></i> Dark</button></div><div class="card"><h1><i class="fas fa-file-pdf"></i> PDF ⇄ Word Converter</h1><p>Convert PDF to Word or Word to PDF</p><select id="conversionType"><option value="pdf2word">PDF to Word</option><option value="word2pdf">Word to PDF</option></select><input type="file" id="fileInput" accept=".pdf,.docx"><button class="btn-primary" id="convertBtn">Convert Document</button><div id="result"></div><p style="font-size:0.8rem;margin-top:1rem">Note: Demo version. Full conversion requires backend API.</p></div></div><script>const darkToggle=document.getElementById('darkToggle');if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');darkToggle.onclick=()=>{document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');};document.getElementById('convertBtn').onclick=()=>{const file=document.getElementById('fileInput').files[0];if(!file){alert('Select a file');return;}const type=document.getElementById('conversionType').value;document.getElementById('result').innerHTML=`<p>✅ Conversion initiated for ${file.name}<br>Demo: ${type === 'pdf2word' ? 'PDF to Word' : 'Word to PDF'} conversion would process here.</p><p><a href="#" style="color:var(--accent)">Download converted file (demo)</a></p>`;};</script></body></html>
