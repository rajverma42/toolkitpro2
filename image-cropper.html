<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Image Cropper - ToolKit Pro</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg-primary:#f8fafc;--bg-surface:#fff;--text-primary:#0f172a;--border-light:#e2e8f0;--primary:#0f3b5f;--accent:#ff8c42}body.dark{--bg-primary:#0a0c10;--bg-surface:#111418;--text-primary:#edf2f7;--border-light:#1e293b}body{background:var(--bg-primary);color:var(--text-primary);font-family:system-ui}.container{max-width:900px;margin:0 auto;padding:2rem}.tool-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}.logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}.theme-toggle{background:var(--bg-surface);border:1px solid var(--border-light);padding:0.5rem 1rem;border-radius:2rem;cursor:pointer}.card{background:var(--bg-surface);border-radius:1.5rem;padding:2rem;border:1px solid var(--border-light)}input,button{padding:0.75rem;margin:0.5rem;border-radius:0.75rem}.btn-primary{background:var(--primary);color:white;border:none;cursor:pointer}.image-container{position:relative;display:inline-block}.preview-img{max-width:100%;border-radius:1rem}.crop-area{margin:1rem 0}@media(max-width:768px){.container{padding:1rem}}</style></head>
<body><div class="container"><div class="tool-header"><a href="index.html" class="logo">ToolKit<span style="color:var(--accent);">Pro</span></a><button class="theme-toggle" id="darkToggle"><i class="fas fa-moon"></i> Dark</button></div><div class="card"><h1><i class="fas fa-crop-alt"></i> Image Cropper</h1><p>Crop images - Enter X,Y,Width,Height</p><input type="file" id="fileInput" accept="image/*"><div class="crop-area"><label>X: <input type="number" id="cropX" value="0"></label><label>Y: <input type="number" id="cropY" value="0"></label><label>Width: <input type="number" id="cropW" value="200"></label><label>Height: <input type="number" id="cropH" value="200"></label></div><button class="btn-primary" id="cropBtn">Crop Image</button><div id="preview"></div></div></div><script>const darkToggle=document.getElementById('darkToggle');if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');darkToggle.onclick=()=>{document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');};let currentImg=null;document.getElementById('fileInput').onchange=(e)=>{const file=e.target.files[0];if(file){const reader=new FileReader();reader.onload=(ev)=>{currentImg=new Image();currentImg.src=ev.target.result;document.getElementById('preview').innerHTML=`<img src="${ev.target.result}" style="max-width:100%;border-radius:1rem">`;};reader.readAsDataURL(file);}};document.getElementById('cropBtn').onclick=()=>{if(!currentImg)return alert('Load an image first');const x=parseInt(document.getElementById('cropX').value);const y=parseInt(document.getElementById('cropY').value);const w=parseInt(document.getElementById('cropW').value);const h=parseInt(document.getElementById('cropH').value);const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.drawImage(currentImg,x,y,w,h,0,0,w,h);canvas.toBlob((blob)=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='cropped.png';a.click();alert('Cropped image downloaded');});};</script></body></html>
