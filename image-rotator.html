<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Image Rotator - ToolKit Pro</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg-primary:#f8fafc;--bg-surface:#fff;--text-primary:#0f172a;--border-light:#e2e8f0;--primary:#0f3b5f;--accent:#ff8c42}body.dark{--bg-primary:#0a0c10;--bg-surface:#111418;--text-primary:#edf2f7;--border-light:#1e293b}body{background:var(--bg-primary);color:var(--text-primary);font-family:system-ui}.container{max-width:900px;margin:0 auto;padding:2rem}.tool-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}.logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}.theme-toggle{background:var(--bg-surface);border:1px solid var(--border-light);padding:0.5rem 1rem;border-radius:2rem;cursor:pointer}.card{background:var(--bg-surface);border-radius:1.5rem;padding:2rem;border:1px solid var(--border-light)}input,button{padding:0.75rem;margin:0.5rem;border-radius:0.75rem}.btn-primary{background:var(--primary);color:white;border:none;cursor:pointer}.btn-group{display:flex;gap:0.5rem;flex-wrap:wrap}.preview-img{max-width:100%;border-radius:1rem;margin-top:1rem}@media(max-width:768px){.container{padding:1rem}}</style></head>
<body><div class="container"><div class="tool-header"><a href="index.html" class="logo">ToolKit<span style="color:var(--accent);">Pro</span></a><button class="theme-toggle" id="darkToggle"><i class="fas fa-moon"></i> Dark</button></div><div class="card"><h1><i class="fas fa-sync-alt"></i> Image Rotator / Flipper</h1><input type="file" id="fileInput" accept="image/*"><div class="btn-group"><button class="btn-primary" id="rotate90">Rotate 90°</button><button class="btn-primary" id="rotate180">Rotate 180°</button><button class="btn-primary" id="flipH">Flip Horizontal</button><button class="btn-primary" id="flipV">Flip Vertical</button></div><div id="preview"></div></div></div><script>const darkToggle=document.getElementById('darkToggle');if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');darkToggle.onclick=()=>{document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');};let currentImage=null;let angle=0;let flipH=false;let flipV=false;document.getElementById('fileInput').onchange=(e)=>{const file=e.target.files[0];if(file){const reader=new FileReader();reader.onload=(ev)=>{currentImage=new Image();currentImage.src=ev.target.result;currentImage.onload=()=>updatePreview();};reader.readAsDataURL(file);}};function updatePreview(){if(!currentImage)return;const canvas=document.createElement('canvas');let w=currentImage.width,h=currentImage.height;if(angle===90||angle===270){[w,h]=[h,w];}canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.translate(w/2,h/2);ctx.rotate(angle*Math.PI/180);if(flipH)ctx.scale(-1,1);if(flipV)ctx.scale(1,-1);ctx.drawImage(currentImage,-currentImage.width/2,-currentImage.height/2,currentImage.width,currentImage.height);const url=canvas.toDataURL();document.getElementById('preview').innerHTML=`<img src="${url}" class="preview-img"><br><button id="downloadBtn" class="btn-primary" style="margin-top:1rem">Download Rotated Image</button>`;document.getElementById('downloadBtn')?.addEventListener('click',()=>{const link=document.createElement('a');link.download='rotated_image.png';link.href=url;link.click();});}document.getElementById('rotate90').onclick=()=>{angle=(angle+90)%360;updatePreview();};document.getElementById('rotate180').onclick=()=>{angle=(angle+180)%360;updatePreview();};document.getElementById('flipH').onclick=()=>{flipH=!flipH;updatePreview();};document.getElementById('flipV').onclick=()=>{flipV=!flipV;updatePreview();};</script></body></html>
